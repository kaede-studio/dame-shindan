<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ダメ人間タイプ診断</title>
<style>
  :root{
    --bg:#2E2A33;
    --card:#3A353F;
    --card2:#423C49;
    --line:#4A444F;
    --ink:#EDE6F0;
    --ink-dim:#A89DB0;
    --ink-faint:#8F8199;
    --accent:#C99BD4;        /* くすみ紫ポップ */
    --accent2:#E8A0B8;       /* くすみピンク */
    --yes:#8FB89A;           /* くすみグリーン */
    --no:#C99090;            /* くすみレッド */
    --shadow:0 16px 40px rgba(0,0,0,0.35);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); }
  body{
    font-family: system-ui, -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    line-height:1.7;
  }
  .app{
    width:100%; max-width:440px;
  }
  .screen{ display:none; animation:fade .35s ease; }
  .screen.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ===== Intro ===== */
  .intro-card{
    background:var(--card); border:1.5px solid var(--line); border-radius:28px;
    padding:40px 30px 34px; text-align:center; box-shadow:var(--shadow);
  }
  .intro-emoji{ font-size:14px; letter-spacing:0.3em; color:var(--accent); font-weight:800; margin-bottom:18px; }
  .intro-title{
    font-size:30px; font-weight:900; letter-spacing:0.02em; margin:0 0 6px;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .intro-sub{ font-size:14px; color:var(--ink-dim); margin:0 0 26px; }
  .intro-desc{
    font-size:13.5px; color:var(--ink-dim); background:var(--card2);
    border-radius:16px; padding:16px 18px; margin-bottom:28px; text-align:left;
  }
  .intro-desc b{ color:var(--ink); font-weight:700; }
  .btn{
    border:none; border-radius:999px; font-family:inherit; cursor:pointer;
    font-weight:800; transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    color:#3A2E40; font-size:17px; padding:16px 40px; width:100%;
    box-shadow:0 8px 20px rgba(201,155,212,0.3);
  }
  .intro-meta{ font-size:11.5px; color:var(--ink-faint); margin-top:16px; }

  /* ===== Quiz ===== */
  .quiz-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding:0 4px; }
  .q-count{ font-weight:800; color:var(--accent); font-size:15px; }
  .q-count .total{ color:var(--ink-faint); font-size:12px; margin-left:3px; }
  .progress{ height:7px; background:var(--card); border-radius:999px; overflow:hidden; margin-bottom:26px; border:1px solid var(--line); }
  .progress-fill{ height:100%; width:0; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .35s ease; }
  .q-card{
    background:var(--card); border:1.5px solid var(--line); border-radius:24px;
    padding:38px 26px; min-height:170px; display:flex; align-items:center; justify-content:center;
    text-align:center; box-shadow:var(--shadow); margin-bottom:24px;
  }
  .q-text{ font-size:20px; font-weight:700; line-height:1.6; }
  .yn{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .btn-yn{
    padding:20px 0; font-size:18px; font-weight:800; border-radius:18px; color:#2E2A33;
  }
  .btn-yes{ background:var(--yes); box-shadow:0 6px 16px rgba(143,184,154,0.25); }
  .btn-no{ background:var(--no); box-shadow:0 6px 16px rgba(201,144,144,0.25); }
  .btn-yn .sub{ display:block; font-size:11px; font-weight:700; opacity:0.7; margin-top:2px; }
  .quiz-foot{ text-align:center; margin-top:18px; }
  .btn-back{ background:none; color:var(--ink-faint); font-size:13px; padding:8px 16px; border:none; cursor:pointer; font-family:inherit; }
  .btn-back:hover{ color:var(--ink-dim); }

  /* ===== Result ===== */
  #result{ max-height:100%; }
  .result-card{
    background:var(--card); border:1.5px solid var(--line); border-radius:28px;
    padding:32px 26px 30px; box-shadow:var(--shadow); text-align:center;
  }
  .result-tag{ font-size:11px; letter-spacing:0.25em; color:var(--accent); font-weight:800; margin-bottom:16px; }
  .result-icon{ width:160px; height:160px; margin:0 auto 6px; }
  .result-icon svg{ width:100%; height:100%; }
  .result-axes{ font-size:12px; color:var(--ink-faint); font-weight:700; letter-spacing:0.04em; margin-bottom:4px; }
  .result-name{ font-size:26px; font-weight:900; margin:0 0 16px; color:var(--ink); }
  .result-lead{
    font-size:14px; color:var(--ink-dim); background:var(--card2); border-radius:16px;
    padding:16px 18px; margin:0 0 20px; text-align:left; line-height:1.75;
  }
  .result-items{ list-style:none; padding:0; margin:0 0 22px; text-align:left; }
  .result-items li{
    font-size:13.5px; color:var(--ink); padding:11px 14px 11px 38px; position:relative;
    background:var(--card2); border-radius:12px; margin-bottom:8px; line-height:1.6;
  }
  .result-items li::before{
    content:"✗"; position:absolute; left:14px; top:11px; color:var(--no); font-weight:800;
  }
  .result-save{
    font-size:14px; color:var(--ink); line-height:1.7; text-align:left;
    background:linear-gradient(120deg, rgba(201,155,212,0.16), rgba(232,160,184,0.16));
    border:1px solid rgba(201,155,212,0.3); border-radius:16px; padding:16px 18px; margin-bottom:26px;
  }
  .save-label{ display:block; font-size:11px; font-weight:800; color:var(--accent); letter-spacing:0.1em; margin-bottom:5px; }
  .share-row{ display:flex; gap:12px; margin-bottom:14px; }
  .btn-share{ flex:1; padding:15px 0; font-size:15px; font-weight:800; border-radius:16px; }
  .btn-x{ background:#1d1d1f; color:#fff; }
  .btn-copy{ background:var(--card2); color:var(--ink); border:1px solid var(--line); }
  .btn-retry{ width:100%; background:none; color:var(--ink-faint); font-size:13.5px; padding:12px; border:none; cursor:pointer; font-family:inherit; }
  .btn-retry:hover{ color:var(--ink-dim); }
  .result-footer{ text-align:center; font-size:11px; color:var(--ink-faint); margin-top:18px; opacity:0.7; }
</style>
</head>
<body>
  <div class="app">

    <!-- INTRO -->
    <section id="intro" class="screen active">
      <div class="intro-card">
        <div class="intro-emoji">◍ ◍ ◍</div>
        <h1 class="intro-title">ダメ人間タイプ診断</h1>
        <p class="intro-sub">あなたのダメさは、どのタイプ？</p>
        <div class="intro-desc">
          お金と時間にまつわる<b>16タイプ</b>のうち、あなたがどれかを診断します。<br>
          12個の質問に<b>YES / NO</b>で答えるだけ。所要時間は<b>約1分</b>。
        </div>
        <button id="start-btn" class="btn btn-primary">診断をはじめる</button>
        <div class="intro-meta">※ 結果はあくまでエンタメです。当たっても泣かない</div>
      </div>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="screen">
      <div class="quiz-head">
        <div class="q-count"><span id="q-num">Q1</span><span class="total" id="q-total">/ 12</span></div>
      </div>
      <div class="progress"><div id="progress-fill" class="progress-fill"></div></div>
      <div class="q-card"><div id="q-text" class="q-text"></div></div>
      <div class="yn">
        <button id="yes-btn" class="btn btn-yn btn-yes">YES<span class="sub">あてはまる</span></button>
        <button id="no-btn" class="btn btn-yn btn-no">NO<span class="sub">あてはまらない</span></button>
      </div>
      <div class="quiz-foot">
        <button id="back-btn" class="btn-back">← 前の質問にもどる</button>
      </div>
    </section>

    <!-- RESULT -->
    <section id="result" class="screen">
      <div class="result-card">
        <div class="result-tag">診断結果</div>
        <div id="result-body"></div>
        <div class="share-row">
          <button id="share-x" class="btn btn-share btn-x">Xでシェア</button>
          <button id="copy-btn" class="btn btn-share btn-copy">結果をコピー</button>
        </div>
        <button id="retry-btn" class="btn-retry">もう一度診断する</button>
      </div>
      <div class="result-footer">ダメ人間タイプ診断</div>
    </section>

  </div>

<script>

// ---- 共通パーツ ----
function bg(color, ring) {
  return `<circle cx="100" cy="100" r="92" fill="${color}"/>`;
}
function ring(color) {
  return `<circle cx="100" cy="100" r="92" stroke="${color}" stroke-width="3" fill="none"/>`;
}
// 顔ベース（cx,cy,表情パーツを差し込む）
function head(cx, cy, hair) {
  return `
    <ellipse cx="${cx}" cy="${cy}" rx="44" ry="42" fill="#E3C3A2"/>
    <ellipse cx="${cx}" cy="${cy}" rx="44" ry="42" stroke="#C9A580" stroke-width="2.5"/>
    ${hair}`;
}

// ====== 状態 ======
let answers = new Array(QUESTIONS.length).fill(null); // true=YES / false=NO
let current = 0;

// ====== 採点 ======
function score() {
  const tally = { U:0,A:0, M:0,T:0, I:0,P:0, B:0,D:0 };
  QUESTIONS.forEach((q, i) => {
    const side = answers[i] ? q.yes : q.no;
    tally[side]++;
  });
  const code =
    (tally.U >= tally.A ? "U":"A") +
    (tally.M >= tally.T ? "M":"T") +
    (tally.I >= tally.P ? "I":"P") +
    (tally.B >= tally.D ? "B":"D");
  return code;
}

// ====== 画面遷移 ======
function show(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

function startQuiz(){
  answers = new Array(QUESTIONS.length).fill(null);
  current = 0;
  show('quiz');
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[current];
  document.getElementById('q-num').textContent = `Q${current+1}`;
  document.getElementById('q-total').textContent = `/ ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.text;
  // progress
  const pct = (current) / QUESTIONS.length * 100;
  document.getElementById('progress-fill').style.width = pct + "%";
  // back button visibility
  document.getElementById('back-btn').style.visibility = current === 0 ? 'hidden' : 'visible';
}

function answer(isYes){
  answers[current] = isYes;
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
  } else {
    document.getElementById('progress-fill').style.width = "100%";
    setTimeout(showResult, 180);
  }
}

function back(){
  if(current > 0){ current--; renderQuestion(); }
}

function showResult(){
  const code = score();
  const t = TYPES[code];
  const el = document.getElementById('result-body');
  const itemsHtml = t.items.map(x=>`<li>${x}</li>`).join('');
  el.innerHTML = `
    <div class="result-icon">${window.DAME_ICONS[code]()}</div>
    <div class="result-axes">${t.axes}</div>
    <h2 class="result-name">${t.name}</h2>
    <p class="result-lead">${t.lead}</p>
    <ul class="result-items">${itemsHtml}</ul>
    <div class="result-save"><span class="save-label">救いの一言</span>${t.save}</div>
  `;
  // share
  const shareText = `私は【${t.name}】でした。\n${t.lead}\n#ダメ人間タイプ診断`;
  const url = location.href.split('#')[0];
  document.getElementById('share-x').onclick = ()=>{
    const u = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(url)}`;
    // window.open はモバイルでポップアップブロックされやすいので location 遷移にする
    location.href = u;
  };
  document.getElementById('copy-btn').onclick = ()=>{
    navigator.clipboard?.writeText(shareText + "\n" + url).then(()=>{
      const b=document.getElementById('copy-btn');
      const o=b.textContent; b.textContent="コピーしました"; setTimeout(()=>b.textContent=o,1500);
    });
  };
  show('result');
  document.getElementById('result').scrollTop = 0;
}

// init
window.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('start-btn').onclick = startQuiz;
  document.getElementById('yes-btn').onclick = ()=>answer(true);
  document.getElementById('no-btn').onclick = ()=>answer(false);
  document.getElementById('back-btn').onclick = back;
  document.getElementById('retry-btn').onclick = ()=>show('intro');
});

</script>
